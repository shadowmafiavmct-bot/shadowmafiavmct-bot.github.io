<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>LightWater | Concientización y cuidado del agua</title>

  <meta name="description" content="Página informativa sobre el cuidado del agua y noticias ambientales">

  <link rel="stylesheet" href="estilopagina.css">
</head>

<body>

<header>
  <div class="logo">LightWater</div>

  <nav>
    <ul>
      <li><a href="index.html">Inicio</a></li>

      <li>
        <a href="#">Categorías</a>

        <div class="submenu">
          <a href="ecosistemas.html">Agua en los ecosistemas</a>
          <a href="salud humana.html">Agua en la salud humana</a>
          <a href="importancia_agua.html">Importancia del agua</a>
        </div>
      </li>

      <li><a href="noticias.html">Noticias</a></li>
      <li><a href="contacto.html">Contacto</a></li>
    </ul>
  </nav>
</header>

<section class="main">

  <div class="carousel">

    <div class="carousel-track" id="track">

      <img src="Imagenes/Vato arreglando llave.jpeg" alt="Persona arreglando una llave">

      <img src="Imagenes/MorraAgua.jpeg" alt="Mujer tomando agua">

      <img src="Imagenes/Vieja.jpeg" alt="Persona relacionada con el agua">

      <img src="Imagenes/gente.jpeg" alt="Grupo de personas">

      <img src="Imagenes/mundoacuatico.jpeg" alt="Mundo acuático">

    </div>

    <button class="arrow left" onclick="prevSlide()">❮</button>

    <button class="arrow right" onclick="nextSlide()">❯</button>

  </div>

  <h2>Noticias Destacadas</h2>

  <div class="products">

    <div class="card">

      <img src="Imagenes/guadalajara.jpeg" alt="Crisis de agua en Guadalajara">

      <h3>Crisis de agua sucia en Guadalajara</h3>

      <button onclick="mostrarDetalles('Crisis de agua sucia en Guadalajara')">
        Detalles
      </button>

    </div>

  </div>

</section>

<script>
  const track = document.getElementById('track');
  const totalSlides = track.children.length;
  let currentIndex = 0;

  function updateCarousel() {
    const slideWidth = document.querySelector('.carousel').offsetWidth;
    track.style.transform = `translateX(-${currentIndex * slideWidth}px)`;
  }

  function nextSlide() {
    currentIndex = (currentIndex + 1) % totalSlides;
    updateCarousel();
  }

  function prevSlide() {
    currentIndex = (currentIndex - 1 + totalSlides) % totalSlides;
    updateCarousel();
  }

  setInterval(nextSlide, 3000);
</script>

<footer>
  <p>&copy; 2026 LightWater. Todos los derechos reservados.</p>
</footer>

</body>
</html>
